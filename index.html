<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시수배정 계산 프로그램</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            main { padding: 0 !important; max-width: 100% !important; }
            .print-clean { border: none !important; box-shadow: none !important; border-radius: 0 !important; }
            .selected-ring { ring: none !important; outline: none !important; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen text-xs sm:text-base">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const CAREER = (reqNum, subKey = 'default') => ({ 
            id: `career-${subKey}-${reqNum}`, 
            name: '1학년 진로와직업', 
            required: reqNum 
        });

        const INIT_SUBJECTS = {
            korean:    { name: '국어', g1: 4, g2: 5, g3: 4, specials: [CAREER(1, 'korean')], teacherCount: 7, memo: '' },
            social:    { name: '사회(역사)', g1: 3, g2: 2, g3: 4, specials: [CAREER(1, 'social')], teacherCount: 5, memo: '' },
            ethics:    { name: '도덕', g1: 3, g2: 0, g3: 2, specials: [CAREER(2, 'ethics')], teacherCount: 3, memo: '' },
            math:      { name: '수학', g1: 4, g2: 4, g3: 3, specials: [CAREER(1, 'math')], teacherCount: 6, memo: '' },
            science:   { name: '과학', g1: 3, g2: 4, g3: 4, specials: [CAREER(1, 'science')], teacherCount: 6, names: ['', '', '', '', '', ''], memo: '' },
            tech_home: { name: '기술·가정', g1: 2, g2: 2, g3: 3, specials: [CAREER(3, 'tech_home')], teacherCount: 4, memo: '' },
            info:      { name: '정보', g1: 0, g2: 2, g3: 0, specials: [], teacherCount: 1, memo: '' },
            pe:        { name: '체육', g1: 3, g2: 3, g3: 3, specials: [CAREER(1, 'pe')], teacherCount: 5, memo: '' },
            music:     { name: '음악', g1: 2, g2: 1, g3: 1, specials: [], teacherCount: 3, memo: '' },
            art:       { name: '미술', g1: 1, g2: 2, g3: 1, specials: [], teacherCount: 3, memo: '' },
            english:   { name: '영어', g1: 3, g2: 3, g3: 4, specials: [], teacherCount: 6, memo: '' },
            career:    { name: '진로와직업', g1: 1, g2: 0, g3: 1, specials: [], teacherCount: 1, memo: '' },
            hanmun:    { name: '한문', g1: 1, g2: 2, g3: 0, specials: [CAREER(1, 'hanmun')], teacherCount: 2, memo: '' },
        };
        const INIT_ORDER = ['korean', 'social', 'ethics', 'math', 'science', 'tech_home', 'info', 'pe', 'music', 'art', 'english', 'career', 'hanmun'];

        const GRADE_META = {
            G1: { name: '1학년', solid: 'bg-indigo-600', soft: 'bg-indigo-50', text: 'text-indigo-700' },
            G2: { name: '2학년', solid: 'bg-emerald-600', soft: 'bg-emerald-50', text: 'text-emerald-700' },
            G3: { name: '3학년', solid: 'bg-amber-600', soft: 'bg-amber-50', text: 'text-amber-700' },
            ETC: { name: '기타', solid: 'bg-slate-600', soft: 'bg-slate-100', text: 'text-slate-700' },
        };

        let uid = 0;
        const newId = (p) => `${p}-${Date.now()}-${uid++}`;

        function buildTeachers(key, s) {
            const out = [];
            for (let i = 0; i < (s.teacherCount || 1); i++) out.push({ id: newId('t'), name: s.names ? s.names[i] : '' });
            return out;
        }
        function buildInitial() {
            const subjects = {}, tables = {};
            INIT_ORDER.forEach(k => {
                const s = INIT_SUBJECTS[k];
                subjects[k] = { name: s.name, g1: s.g1, g2: s.g2, g3: s.g3, specials: s.specials.map(sp => ({ ...sp })), memo: '' };
                tables[k] = { teachers: buildTeachers(k, s), alloc: {} };
            });
            return { subjects, order: [...INIT_ORDER], classCounts: { G1: 11, G2: 11, G3: 11 }, tables, activeKey: '' };
        }

        const numShow = (n) => (n === 0 || n === undefined || n === null ? '' : String(n));

        function App() {
            const init = useRef(buildInitial());
            const [subjects, setSubjects] = useState(init.current.subjects);
            const [order, setOrder] = useState(init.current.order);
            const [classCounts, setClassCounts] = useState(init.current.classCounts);
            const [tables, setTables] = useState(init.current.tables);
            const [activeKey, setActiveKey] = useState(init.current.activeKey);
            const [tab, setTab] = useState('all');
            const [printMode, setPrintMode] = useState(false);
            const [sel, setSel] = useState(null);   
            const [history, setHistory] = useState([]);
            const [hi, setHi] = useState(-1);
            const [confirmDel, setConfirmDel] = useState(null);
            const [confirmSubDel, setConfirmSubDel] = useState(false);
            const [toast, setToast] = useState('');
            const [mobileEditCell, setMobileEditCell] = useState(null); 

            const allocRef = useRef({});
            const selRef = useRef(null);
            const gridRef = useRef(null);
            const fileInputRef = useRef(null);

            const subject = subjects[activeKey] || { name: '', g1: 0, g2: 0, g3: 0, specials: [], memo: '' };
            const table = tables[activeKey] || { teachers: [], alloc: {} };
            const teachers = table.teachers;
            const alloc = table.alloc;

            useEffect(() => { allocRef.current = alloc; }, [alloc]);

            const allColumns = useMemo(() => {
                const cols = [];
                [['G1', subject.g1], ['G2', subject.g2], ['G3', subject.g3]].forEach(([gid, req]) => {
                    for (let c = 1; c <= classCounts[gid]; c++) cols.push({ id: `${gid}-${c}`, short: `${c}반`, label: `${GRADE_META[gid].name} ${c}반`, gradeId: gid, required: req });
                });
                (subject.specials || []).forEach(s => cols.push({ id: s.id, short: s.name, label: s.name, gradeId: 'ETC', required: s.required }));
                return cols;
            }, [subject, classCounts]);

            const visibleColumns = useMemo(() => {
                if (printMode || tab === 'all') return allColumns;
                if (tab === 'etc') return allColumns.filter(c => c.gradeId === 'ETC');
                return allColumns.filter(c => c.gradeId === `G${tab}`);
            }, [allColumns, tab, printMode]);

            const headerGroups = useMemo(() => {
                const g = []; let i = 0;
                while (i < visibleColumns.length) {
                    const gid = visibleColumns[i].gradeId; let span = 0;
                    while (i + span < visibleColumns.length && visibleColumns[i + span].gradeId === gid) span++;
                    g.push({ gid, span, req: visibleColumns[i].required }); i += span;
                }
                return g;
            }, [visibleColumns]);

            const setTable = (mut) => setTables(tb => ({ ...tb, [activeKey]: mut(tb[activeKey]) }));
            const setAllocLive = (a) => { allocRef.current = a; setTable(t => ({ ...t, alloc: a })); };

            const resetHistory = (a) => { setHistory([JSON.stringify(a)]); setHi(0); };
            const pushHistory = (currentAlloc) => {
                const s = JSON.stringify(currentAlloc);
                setHistory(h => {
                    const trimmed = h.slice(0, hi + 1);
                    if (trimmed[trimmed.length - 1] === s) return h;
                    const nh = [...trimmed, s];
                    setHi(nh.length - 1);
                    return nh;
                });
            };
            const undo = () => { if (hi > 0) { const a = JSON.parse(history[hi - 1]); setAllocLive(a); setHi(hi - 1); } };
            const redo = () => { if (hi < history.length - 1) { const a = JSON.parse(history[hi + 1]); setAllocLive(a); setHi(hi + 1); } };

            useEffect(() => { resetHistory(alloc); }, [activeKey]);
            useEffect(() => { selRef.current = sel; }, [sel]);

            const isMobile = () => /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            const onCellDown = (r, c) => {
                if (printMode) return;
                if (isMobile()) {
                    setSel({ a: { r, c }, f: { r, c } });
                    setMobileEditCell({ r, c, teacherId: teachers[r].id, teacherName: teachers[r].name, colId: visibleColumns[c].id, colLabel: visibleColumns[c].label, val: alloc[teachers[r].id]?.[visibleColumns[c].id] || 0 });
                    return;
                }
                setSel({ a: { r, c }, f: { r, c } });
                if (gridRef.current) gridRef.current.focus();
            };

            const handleGridKeyDown = (e) => {
                if (printMode || !sel) return;
                const val = parseInt(e.key, 10);
                if (!isNaN(val)) {
                    e.preventDefault();
                    const nextAlloc = { ...alloc, [teachers[sel.a.r].id]: { ...alloc[teachers[sel.a.r].id], [visibleColumns[sel.a.c].id]: val } };
                    setAllocLive(nextAlloc);
                    pushHistory(nextAlloc);
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    e.preventDefault();
                    const nextAlloc = { ...alloc, [teachers[sel.a.r].id]: { ...alloc[teachers[sel.a.r].id], [visibleColumns[sel.a.c].id]: 0 } };
                    setAllocLive(nextAlloc);
                    pushHistory(nextAlloc);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (sel.a.r < teachers.length - 1) setSel({ a: { r: sel.a.r + 1, c: sel.a.c }, f: { r: sel.a.r + 1, c: sel.a.c } });
                }
            };

            const flash = (m) => { setToast(m); setTimeout(() => setToast(''), 1600); };
            const importFromJSONFile = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.readAsText(file, "UTF-8");
                reader.onload = (event) => {
                    try {
                        const p = JSON.parse(event.target.result);
                        if(p.subjects && p.tables && p.order) {
                            setSubjects(p.subjects); setOrder(p.order); setClassCounts(p.classCounts); setTables(p.tables); setActiveKey(p.order[0]);
                            flash('데이터 복구 성공!');
                        } else alert('파일 형식이 맞지 않습니다.');
                    } catch(err) { alert('파일 읽기 오류'); }
                    if (fileInputRef.current) fileInputRef.current.value = '';
                };
            };

            return (
                <div onKeyDown={handleGridKeyDown} className="bg-slate-100 min-h-screen text-xs sm:text-base">
                    <header className="bg-white border-b p-4 text-center">
                        <h1 className="text-xl font-black">시수배정 계산 프로그램</h1>
                    </header>
                    <main className="p-4">
                        <div className="flex gap-2 mb-4">
                            {order.map(k => <button key={k} onClick={() => setActiveKey(k)} className={`px-4 py-2 rounded ${activeKey === k ? 'bg-blue-500 text-white' : 'bg-white'}`}>{subjects[k].name}</button>)}
                        </div>
                        {activeKey && (
                            <div ref={gridRef} tabIndex={0} className="overflow-x-auto bg-white p-4">
                                <table className="w-full border">
                                    <thead><tr><th className="border p-2">교사명</th>{visibleColumns.map(c => <th key={c.id} className="border p-2">{c.short}</th>)}</tr></thead>
                                    <tbody>
                                        {teachers.map((t, r) => (
                                            <tr key={t.id}>
                                                <td className="border p-2">{t.name}</td>
                                                {visibleColumns.map((c, ci) => (
                                                    <td key={c.id} onMouseDown={(e) => onCellDown(r, ci)} className={`border p-2 cursor-pointer ${sel && sel.a.r === r && sel.a.c === ci ? 'bg-blue-200' : ''}`}>
                                                        {numShow(alloc[t.id]?.[c.id])}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                    {toast && <div className="fixed bottom-4 left-4 bg-black text-white p-2 rounded">{toast}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
